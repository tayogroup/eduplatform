<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live admin menu · EduPlatform portal</title>
<style>
  :root{--ink:#12263a;--ink2:#3f5872;--muted:#6b7f93;--line:#d8e2ec;--bg:#f4f7fa;--card:#ffffff;--blue:#17324d;--blue2:#2a6cb0;--sky:#e8f1fa;--amber:#b97e12;--amber-bg:#fdf3df;--red:#b3392c;--red-bg:#fbe9e6;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 system-ui,-apple-system,"Segoe UI",Arial,sans-serif}
  .top{background:var(--blue);color:#fff;padding:14px 0}
  .wrap{width:min(1180px,calc(100% - 32px));margin:0 auto}
  .top .wrap{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{font-weight:900;font-size:17px}.brand small{display:block;font-weight:700;font-size:12px;color:#b9cbdd}
  .top .note{font-size:12px;color:#b9cbdd}
  main{padding:22px 0 48px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:16px}
  h1{margin:0 0 2px;font-size:22px}
  h2{margin:0 0 10px;font-size:16px}
  .sub{margin:0;color:var(--muted);font-size:13px}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  a.btn{display:inline-flex;align-items:center;min-height:36px;padding:0 14px;border:1px solid var(--line);border-radius:8px;background:var(--sky);color:var(--blue);text-decoration:none;font-size:13px;font-weight:900}
  a.btn.primary{background:var(--blue2);border-color:var(--blue2);color:#fff}
  a.btn:hover{border-color:var(--blue2)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:16px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .kpi b{display:block;font-size:22px;color:var(--blue2)}
  .kpi span{font-size:12px;color:var(--muted);font-weight:700}
  .health{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
  .hpill{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;border-radius:8px;border:1px solid var(--line);background:var(--bg);font-size:12px;font-weight:800;color:var(--ink2)}
  .hpill .tag{display:inline-flex;align-items:center;justify-content:center;min-height:22px;padding:0 9px;border-radius:999px;font-size:11px;font-weight:900}
  .hpill .tag.ready{background:var(--sky);color:var(--blue2)}
  .hpill .tag.missing{background:var(--red-bg);color:var(--red)}
  .wf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
  a.wf{display:block;position:relative;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px 14px;text-decoration:none;color:var(--ink)}
  a.wf:hover{border-color:var(--blue2);background:var(--sky)}
  a.wf .step{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;margin-bottom:8px;border-radius:999px;background:var(--blue2);color:#fff;font-size:12px;font-weight:900}
  a.wf strong{display:block;font-size:13px;color:var(--blue2);margin-bottom:3px}
  a.wf span.desc{display:block;font-size:12px;color:var(--muted)}
  a.wf.portal strong::after{content:" ↗ portal";font-size:10px;color:var(--amber)}
  .search-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .search-row input{flex:1;min-width:220px;min-height:42px;padding:0 13px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);font:inherit;font-size:14px}
  .search-row input:focus{outline:2px solid var(--blue2);outline-offset:-1px}
  .count{color:var(--muted);font-size:13px;font-weight:800}
  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .section{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px}
  .nav-grid{display:grid;gap:10px}
  .nav-card{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--ink);text-decoration:none}
  .nav-card:hover{border-color:var(--blue2);background:var(--sky)}
  .nav-card strong{display:block;margin-bottom:3px;color:var(--blue2);font-size:14px}
  .nav-card span.desc{display:block;font-size:12px;color:var(--muted)}
  .nav-card.portal strong::after{content:" ↗ portal";font-size:10px;color:var(--amber)}
  .pill{display:inline-flex;align-items:center;justify-content:center;min-height:24px;padding:0 9px;border-radius:999px;font-size:11px;font-weight:900;white-space:nowrap}
  .pill.ready{background:var(--sky);color:var(--blue2)}
  .pill.missing{background:var(--red-bg);color:var(--red)}
  .pill.external{background:var(--sky);color:var(--ink2)}
  .empty{display:none;padding:16px;border:1px dashed var(--line);border-radius:10px;background:var(--card);color:var(--muted);font-weight:800;margin-bottom:16px}
  .status{padding:12px 14px;border-radius:8px;background:var(--sky);color:var(--blue);font-weight:700}
  .status.error{background:var(--red-bg);color:var(--red)}
</style>
</head>
<body>
<header class="top"><div class="wrap">
  <div class="brand">EduPlatform Portal<small>Live admin menu</small></div>
  <div class="note" id="mode-note">Token-authenticated · parallel-run of live_admin.php</div>
</div></header>
<main class="wrap">
  <div class="panel">
    <h1 id="title">Operations Hub</h1>
    <p class="sub" id="subtitle">Live-session operations directory.</p>
    <div class="actions" id="actions" hidden></div>
  </div>
  <div id="status" class="status">Loading live admin menu…</div>
  <section class="kpis" id="kpis" hidden></section>
  <div class="panel" id="health-panel" hidden><h2>Implementation health</h2><div class="health" id="health"></div></div>
  <div class="panel" id="workflow-panel" hidden><h2>Primary admin workflow</h2><div class="wf-grid" id="workflow"></div></div>
  <div class="panel search-row" id="search-panel" hidden>
    <input id="search" type="search" placeholder="Search links, categories, or descriptions" autocomplete="off">
    <span class="count" id="count"></span>
  </div>
  <p class="empty" id="empty">No matching links found.</p>
  <section class="grid" id="sections" hidden></section>
</main>
<script>
(() => {
  const qs = new URLSearchParams(location.search);
  const endpoint = (qs.get("endpoint") || "").trim();
  const token = (qs.get("token") || "").replace(/[^A-Za-z0-9._-]/g, "");
  const $ = (s) => document.querySelector(s);
  const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const safeUrl = (u) => { u = String(u ?? ""); return /^https?:\/\//i.test(u) ? u : "#"; };

  if (!endpoint || !token) { $("#status").className = "status error"; $("#status").textContent = "Missing endpoint/token — open via the Moodle portal launch link."; return; }

  async function load() {
    try {
      const r = await fetch(endpoint + "?" + new URLSearchParams({ report: "live-admin", token }));
      if (!r.ok) throw new Error("HTTP " + r.status + " — " + (await r.text()).slice(0, 200));
      const d = await r.json();
      if (!d.ok) throw new Error(d.error || "unknown");
      render(d);
    } catch (e) { $("#status").className = "status error"; $("#status").hidden = false; $("#status").textContent = "Could not load: " + e.message; }
  }

  const navCard = (l, category) => {
    const search = (category + " " + (l.title || "") + " " + (l.desc || "") + " " + (l.url || "")).toLowerCase();
    return `<a class="nav-card${l.portal ? " portal" : ""}" href="${esc(safeUrl(l.url))}" data-search="${esc(search)}">
      <span><strong>${esc(l.title)}</strong><span class="desc">${esc(l.desc)}</span></span>
      <span class="pill ${esc(l.status)}">${esc(l.status)}</span>
    </a>`;
  };

  function render(d) {
    $("#title").textContent = d.title || "Operations Hub";
    $("#subtitle").textContent = d.subtitle || "Live-session operations directory.";
    const acts = d.actions || [];
    if (acts.length) {
      $("#actions").innerHTML = acts.map((a) => `<a class="btn${a.primary ? " primary" : ""}" href="${esc(safeUrl(a.url))}">${esc(a.title)}</a>`).join("");
      $("#actions").hidden = false;
    }
    const c = d.counts || {};
    $("#kpis").innerHTML = [
      ["Links", c.links], ["Ready", c.ready], ["Missing", c.missing],
      ["External", c.external], ["Portal-migrated", c.portal],
    ].map(([label, n]) => `<div class="kpi"><b>${Number(n) || 0}</b><span>${esc(label)}</span></div>`).join("");
    $("#kpis").hidden = false;

    const health = d.health || [];
    if (health.length) {
      $("#health").innerHTML = health.map((h) => `<div class="hpill"><span>${esc(h.label)}</span><span class="tag ${h.ready ? "ready" : "missing"}">${h.ready ? "ready" : "missing"}</span></div>`).join("");
      $("#health-panel").hidden = false;
    }

    const wf = d.workflow || [];
    if (wf.length) {
      $("#workflow").innerHTML = wf.map((w) => `<a class="wf${w.portal ? " portal" : ""}" href="${esc(safeUrl(w.url))}"><span class="step">${esc(w.step)}</span><strong>${esc(w.title)}</strong><span class="desc">${esc(w.desc)}</span></a>`).join("");
      $("#workflow-panel").hidden = false;
    }

    $("#sections").innerHTML = (d.sections || []).map((s) => `
      <article class="section">
        <h2>${esc(s.category)}</h2>
        <div class="nav-grid">${(s.links || []).map((l) => navCard(l, s.category || "")).join("") || "<span class='sub'>No links configured.</span>"}</div>
      </article>`).join("");
    $("#sections").hidden = false;
    $("#search-panel").hidden = false;
    $("#status").hidden = true;
    wireSearch();
  }

  function wireSearch() {
    const input = $("#search");
    const cards = Array.from(document.querySelectorAll(".nav-card"));
    const sections = Array.from(document.querySelectorAll(".section"));
    const update = () => {
      const q = (input.value || "").toLowerCase().trim();
      let visible = 0;
      sections.forEach((section) => {
        let sectionVisible = 0;
        section.querySelectorAll(".nav-card").forEach((card) => {
          const match = !q || (card.getAttribute("data-search") || "").indexOf(q) !== -1;
          card.style.display = match ? "" : "none";
          if (match) { visible += 1; sectionVisible += 1; }
        });
        section.style.display = sectionVisible ? "" : "none";
      });
      $("#count").textContent = visible + " of " + cards.length + " links";
      $("#empty").style.display = visible ? "none" : "block";
    };
    input.addEventListener("input", update);
    update();
  }

  load();
})();
</script>
</body>
</html>
