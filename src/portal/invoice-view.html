<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Invoice · EduPlatform portal</title>
<style>
  :root{--ink:#12263a;--ink2:#3f5872;--muted:#6b7f93;--line:#d8e2ec;--bg:#f4f7fa;--card:#ffffff;--blue:#17324d;--blue2:#2a6cb0;--sky:#e8f1fa;--amber:#b97e12;--amber-bg:#fdf3df;--red:#b3392c;--red-bg:#fbe9e6;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 system-ui,-apple-system,"Segoe UI",Arial,sans-serif}
  .top{background:var(--blue);color:#fff;padding:14px 0}
  .wrap{width:min(980px,calc(100% - 32px));margin:0 auto}
  .top .wrap{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{font-weight:900;font-size:17px}.brand small{display:block;font-weight:700;font-size:12px;color:#b9cbdd}
  .top .note{font-size:12px;color:#b9cbdd}
  main{padding:22px 0 48px}
  .status{padding:12px 14px;border-radius:8px;background:var(--sky);color:var(--blue);font-weight:700;margin-bottom:16px}
  .status.error{background:var(--red-bg);color:var(--red)}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  a.btn,button.btn{display:inline-flex;align-items:center;justify-content:center;min-height:38px;padding:0 14px;border:0;border-radius:8px;background:var(--blue2);color:#fff;text-decoration:none;font:inherit;font-size:13px;font-weight:900;cursor:pointer}
  a.btn:hover,button.btn:hover{background:var(--blue)}
  .btn.light{background:var(--card);color:var(--blue);border:1px solid var(--line)}
  .sheet{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:26px;box-shadow:0 12px 28px rgba(18,38,58,.06)}
  .head{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;border-bottom:2px solid var(--blue);padding-bottom:16px;margin-bottom:18px;flex-wrap:wrap}
  .head h1{margin:0;font-size:26px;font-weight:900;color:var(--ink)}
  .head .sub{margin:5px 0 0;color:var(--muted);font-size:13px;font-weight:700}
  .number{text-align:right}
  .number strong{display:block;font-size:20px;font-weight:900;color:var(--ink)}
  .pill{display:inline-block;padding:3px 11px;border-radius:999px;font-size:11px;font-weight:900;margin-top:5px}
  .pill.paid{background:#e1f2ff;color:var(--blue2)}
  .pill.due{background:var(--amber-bg);color:var(--amber)}
  .pill.overdue{background:var(--red-bg);color:var(--red)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
  .box{padding:12px 14px;border:1px solid var(--line);border-radius:8px;background:var(--bg)}
  .box span{display:block;color:var(--ink2);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.4px}
  .box strong{display:block;margin-top:3px;font-size:14px;font-weight:900;color:var(--ink)}
  .box .small{display:block;color:var(--muted);font-size:12px}
  .tablewrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
  th,td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
  th{color:var(--ink2);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .total{display:grid;grid-template-columns:1fr 260px;gap:18px;margin-top:18px}
  .summary{border:1px solid var(--line);border-radius:8px;overflow:hidden;align-self:start}
  .summary div{display:flex;justify-content:space-between;gap:12px;padding:9px 12px;border-bottom:1px solid var(--line);font-weight:800;font-size:13px}
  .summary div:last-child{border-bottom:0;background:var(--blue);color:#fff;font-weight:900}
  .note{margin-bottom:10px;padding:11px 13px;border-radius:8px;background:var(--amber-bg);color:var(--amber);font-size:13px;font-weight:700}
  .note.ok{background:var(--sky);color:var(--ink2)}
  .receipts{margin-bottom:10px;padding:11px 13px;border:1px dashed var(--line);border-radius:8px;color:var(--ink2);font-size:13px;font-weight:700}
  .receipts a{color:var(--blue2);font-weight:900}
  .muted{color:var(--muted);font-size:12px}
  @media(max-width:720px){.head,.grid,.total{display:block}.number{text-align:left;margin-top:10px}.sheet{padding:18px}.box{margin-bottom:10px}.summary{margin-top:14px}}
  @media print{
    body{background:#fff}
    .top,.actions,#status{display:none!important}
    main{padding:0}
    .wrap{width:100%}
    .sheet{border:0;box-shadow:none;border-radius:0;padding:0}
    .receipts a{display:none}
  }
</style>
</head>
<body>
<header class="top"><div class="wrap">
  <div class="brand">EduPlatform Portal<small>Invoice</small></div>
  <div class="note">Token-authenticated · parallel-run of invoice_view.php</div>
</div></header>
<main class="wrap">
  <div id="status" class="status">Loading invoice…</div>
  <nav class="actions" id="actions" hidden>
    <a class="btn" id="pay" hidden>Pay online</a>
    <button class="btn light" type="button" onclick="window.print()">Print</button>
  </nav>
  <article class="sheet" id="sheet" hidden>
    <section class="head">
      <div>
        <h1 id="workspace">Invoice</h1>
        <p class="sub" id="supportlabel"></p>
      </div>
      <div class="number">
        <strong id="invoicenumber"></strong>
        <span id="statuspill"></span>
      </div>
    </section>
    <section class="grid">
      <div class="box"><span>Bill to</span><strong id="billto"></strong><span class="small" id="billemail"></span></div>
      <div class="box"><span>Student</span><strong id="studentname"></strong><span class="small" id="studentaccount"></span></div>
      <div class="box"><span>Issued</span><strong id="issuedat"></strong></div>
      <div class="box"><span>Due date</span><strong id="dueat"></strong></div>
    </section>
    <div class="tablewrap">
      <table>
        <thead><tr><th>Description</th><th>Qty</th><th>Unit</th><th>Discount</th><th>Tax</th><th>Total</th></tr></thead>
        <tbody id="lines"></tbody>
      </table>
    </div>
    <section class="total">
      <div>
        <div class="note" id="paynote"></div>
        <div class="receipts" id="receipts"></div>
        <div class="receipts" id="plan" hidden></div>
      </div>
      <div class="summary" id="summary"></div>
    </section>
  </article>
</main>
<script>
(() => {
  const qs = new URLSearchParams(location.search);
  const endpoint = (qs.get("endpoint") || "").trim();
  const token = (qs.get("token") || "").replace(/[^A-Za-z0-9._-]/g, "");
  const $ = (s) => document.querySelector(s);
  const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const dateOnly = (t) => t ? new Date(t * 1000).toLocaleDateString(undefined, { weekday:"short", day:"numeric", month:"short", year:"numeric" }) : "";

  if (!endpoint || !token) { $("#status").className = "status error"; $("#status").textContent = "Missing endpoint/token — open via the Moodle portal launch link."; return; }

  const url = () => {
    const p = new URLSearchParams({ report: "invoice-view", token });
    for (const k of ["consumer", "workspaceid", "invoiceid"]) { const v = qs.get(k); if (v) p.set(k, v); }
    return endpoint + "?" + p;
  };

  // Status pill: paid (blue) / due (amber) / overdue (red). Overdue comes from
  // the API (past due date + balance); otherwise a remaining balance means due.
  const pillClass = (inv) => inv.overdue ? "overdue" : (parseFloat(inv.balancedue || "0") > 0 ? "due" : "paid");

  function render(d) {
    const inv = d.invoice || {};
    $("#workspace").textContent = (d.workspace && d.workspace.name) || "Invoice";
    $("#supportlabel").textContent = d.supportlabel || "";
    $("#invoicenumber").textContent = inv.invoicenumber || "";
    $("#statuspill").outerHTML = `<span class="pill ${pillClass(inv)}">${esc(inv.status_label || inv.status || "")}</span>`;
    $("#billto").textContent = (d.account && d.account.displayname) || "Billing account";
    $("#billemail").textContent = (d.account && d.account.billingemail) || "";
    $("#studentname").textContent = d.student ? d.student.name : "Not assigned";
    $("#studentaccount").textContent = d.student ? (d.student.account_label || "") : "";
    $("#issuedat").textContent = inv.issuedat ? dateOnly(inv.issuedat) : "Not issued";
    $("#dueat").textContent = inv.dueat ? dateOnly(inv.dueat) : "Not set";

    $("#lines").innerHTML = (d.lines || []).map((l) => `
      <tr><td>${esc(l.description)}</td><td>${esc(l.quantity)}</td><td>${esc(l.unitamount)}</td><td>${esc(l.discountamount)}</td><td>${esc(l.taxamount)}</td><td>${esc(l.linetotal)}</td></tr>`).join("")
      || "<tr><td colspan='6' class='muted'>No line items recorded.</td></tr>";

    if (d.canpayonline) {
      $("#paynote").className = "note ok";
      $("#paynote").textContent = "Online payment is available through " + (d.gateway_displayname || "the payment gateway") + ". Use the Pay online button to open the secure hosted checkout.";
      if (d.payurl) { $("#pay").href = d.payurl; $("#pay").hidden = false; }
    } else {
      $("#paynote").textContent = "Online payment is not enabled yet. Please contact " + (d.supportlabel || "the finance office") + " for payment instructions.";
    }

    const pays = d.payments || [];
    $("#receipts").innerHTML = pays.length
      ? pays.map((p) => `<div>${esc(p.receiptnumber + " / " + p.currency + " " + p.allocationamount + " / " + p.method_label)}${p.receipturl ? ` <a href="${esc(p.receipturl)}">View receipt</a>` : ""}</div>`).join("")
      : "No receipts have been recorded for this invoice yet.";

    if (d.plan && (d.installments || []).length) {
      $("#plan").hidden = false;
      $("#plan").innerHTML = `<strong>${esc(d.plan.plannumber)} payment schedule</strong>` +
        d.installments.map((i) => `<div>${esc(i.dueat ? dateOnly(i.dueat) : "Due date not set")} / ${esc(i.currency + " " + i.balancedue)} / ${esc(i.status_label)}</div>`).join("");
    }

    $("#summary").innerHTML = [
      ["Subtotal", inv.currency + " " + inv.subtotal],
      ["Discount", inv.discounttotal],
      ["Tax", inv.taxtotal],
      ["Total", inv.total],
      ["Paid", inv.paidamount],
      ["Balance due", inv.balancedue],
    ].map(([label, value]) => `<div><span>${esc(label)}</span><strong>${esc(value ?? "")}</strong></div>`).join("");

    $("#actions").hidden = false;
    $("#sheet").hidden = false;
    $("#status").hidden = true;
    document.title = "Invoice " + (inv.invoicenumber || "") + " · EduPlatform portal";
  }

  (async function load() {
    try {
      const r = await fetch(url());
      if (!r.ok) throw new Error("HTTP " + r.status + " — " + (await r.text()).slice(0, 200));
      const d = await r.json();
      if (!d.ok) throw new Error(d.error || "unknown");
      render(d);
    } catch (e) { $("#status").className = "status error"; $("#status").hidden = false; $("#status").textContent = "Could not load: " + e.message; }
  })();
})();
</script>
</body>
</html>
