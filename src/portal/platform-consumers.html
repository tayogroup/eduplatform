<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Platform consumers · EduPlatform portal</title>
<style>
  :root{--ink:#12263a;--ink2:#3f5872;--muted:#6b7f93;--line:#d8e2ec;--bg:#f4f7fa;--card:#ffffff;--blue:#17324d;--blue2:#2a6cb0;--sky:#e8f1fa;--amber:#b97e12;--amber-bg:#fdf3df;--red:#b3392c;--red-bg:#fbe9e6;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 system-ui,-apple-system,"Segoe UI",Arial,sans-serif}
  .top{background:var(--blue);color:#fff;padding:14px 0}
  .wrap{width:min(1240px,calc(100% - 32px));margin:0 auto}
  .top .wrap{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{font-weight:900;font-size:17px}.brand small{display:block;font-weight:700;font-size:12px;color:#b9cbdd}
  .top .note{font-size:12px;color:#b9cbdd}
  main{padding:22px 0 48px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:16px}
  h1{margin:0 0 2px;font-size:22px}
  h2{margin:0 0 10px;font-size:16px}
  h3{margin:0 0 6px;font-size:15px}
  .sub{margin:0;color:var(--muted);font-size:13px}
  .muted{color:var(--muted);font-size:12px;display:block;margin-top:3px}
  .status{padding:12px 14px;border-radius:8px;background:var(--sky);color:var(--blue);font-weight:700;margin-bottom:16px}
  .status.error{background:var(--red-bg);color:var(--red)}
  .status.saved{background:#e1f2ff;color:var(--blue2)}
  .toplinks{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .btn{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:0 12px;border:0;border-radius:8px;background:var(--blue2);color:#fff;text-decoration:none;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit}
  .btn.light{background:var(--sky);color:var(--blue);border:1px solid var(--line)}
  .btn:disabled{opacity:.55;cursor:wait}
  .tophead{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
  .row{display:grid;grid-template-columns:minmax(300px,1.2fr) minmax(300px,1fr);gap:12px;margin-bottom:14px}
  .card{border:1px solid var(--line);border-radius:10px;padding:14px 16px;background:var(--card)}
  .pill{display:inline-flex;min-height:22px;align-items:center;margin:0 5px 5px 0;padding:1px 9px;border-radius:999px;background:var(--sky);color:var(--blue);font-size:11px;font-weight:900}
  .pill.warn{background:var(--amber-bg);color:var(--amber)}
  .pill.bad{background:var(--red-bg);color:var(--red)}
  .linkrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  form.admin{margin-top:12px;padding:12px;border:1px dashed var(--line);border-radius:8px;background:var(--bg)}
  .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .field{display:grid;gap:3px;margin-bottom:6px}
  .field label{font-size:11px;font-weight:900;color:var(--ink2);text-transform:uppercase;letter-spacing:.3px}
  .field.full{grid-column:1/-1}
  input.in,select.in,textarea.in{width:100%;border:1px solid var(--line);border-radius:7px;padding:7px 9px;font:inherit;font-size:13px;background:var(--card);color:var(--ink)}
  textarea.in{min-height:56px;resize:vertical}
  .check{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:800;color:var(--ink2);margin:8px 8px 0 0}
  .domain{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;padding:10px 0;border-bottom:1px solid var(--line)}
  .domain:last-child{border-bottom:0}
  .domain form{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;align-items:center}
  .domain select.in{width:auto}
  .empty{padding:14px;border:1px dashed var(--line);border-radius:8px;color:var(--muted);font-weight:800;background:var(--card)}
  @media(max-width:960px){.row,.grid2,.tophead,.domain{grid-template-columns:1fr}.toplinks,.domain form{justify-content:flex-start}}
</style>
</head>
<body>
<header class="top"><div class="wrap">
  <div class="brand">EduPlatform Portal<small>Platform consumers</small></div>
  <div class="note">Token-authenticated · parallel-run of platform_consumers.php</div>
</div></header>
<main class="wrap">
  <div class="panel tophead">
    <div>
      <h1>Platform Consumer Management</h1>
      <p class="sub">Foundation controls for academy, marketplace, institution, and teacher consumer apps, domains, workspace status, and debug links.</p>
    </div>
    <nav class="toplinks" id="toplinks"></nav>
  </div>
  <div id="status" class="status">Loading consumers…</div>
  <div id="consumers"></div>
</main>
<script>
(() => {
  const qs = new URLSearchParams(location.search);
  const endpoint = (qs.get("endpoint") || "").trim();
  const token = (qs.get("token") || "").replace(/[^A-Za-z0-9._-]/g, "");
  const $ = (s) => document.querySelector(s);
  const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  if (!endpoint || !token) { $("#status").className = "status error"; $("#status").textContent = "Missing endpoint/token — open via the Moodle portal launch link."; return; }

  const url = () => endpoint + "?" + new URLSearchParams({ report: "platform-consumers", token });

  let D = null;

  async function load() {
    try {
      const r = await fetch(url());
      if (!r.ok) throw new Error("HTTP " + r.status + " — " + (await r.text()).slice(0, 200));
      const d = await r.json();
      if (!d.ok) throw new Error(d.error || "unknown");
      D = d;
      render(d);
    } catch (e) { $("#status").className = "status error"; $("#status").hidden = false; $("#status").textContent = "Could not load: " + e.message; }
  }

  const options = (map, selected) => Object.entries(map || {}).map(([v, l]) =>
    `<option value="${esc(v)}"${String(selected) === String(v) ? " selected" : ""}>${esc(l)}</option>`).join("");

  const field = (label, inner, full) => `<div class="field${full ? " full" : ""}"><label>${esc(label)}</label>${inner}</div>`;
  const input = (name, value, placeholder) => `<input class="in" name="${esc(name)}" value="${esc(value)}"${placeholder ? ` placeholder="${esc(placeholder)}"` : ""}>`;
  const textarea = (name, value) => `<textarea class="in" name="${esc(name)}">${esc(value)}</textarea>`;
  const select = (name, map, selected, extraClass) => `<select class="in${extraClass ? " " + extraClass : ""}" name="${esc(name)}">${options(map, selected)}</select>`;

  const linkBtn = (href, label) => href ? `<a class="btn light" href="${esc(href)}" target="_blank" rel="noopener">${esc(label)}</a>` : "";

  const consumerForm = (c, o) => `
    <form class="admin" data-do="update_consumer" data-consumerid="${c.id}" data-workspaceid="${c.workspaceid}">
      <div class="grid2">
        ${field("Name", input("consumer_name", c.name))}
        ${field("Slug", input("consumer_slug", c.slug))}
        ${field("Consumer type", select("consumer_type", o.consumer_type, c.consumer_type))}
        ${field("Institution type", select("institution_type", o.institution_type, c.institution_type))}
        <div class="field faith-field"><label>Faith sub-category</label><select class="in" name="faith_subcategory"><option value="">Select</option>${options(o.faith_subcategory, c.faith_subcategory)}</select></div>
        ${field("Teaching method", select("teaching_method", o.teaching_method, c.teaching_method))}
        ${field("Operator type", select("operator_type", o.operator_type, c.operator_type))}
        ${field("Consumer status", select("consumer_status", o.status, c.status))}
        ${field("Workspace status", select("workspace_status", o.status, c.workspacestatus))}
        ${field("Support email", input("supportemail", c.supportemail), true)}
        ${field("Logo URL", input("logourl", c.logourl, "https://app.example.org/... or /local/..."), true)}
        ${field("Initials", `<input class="in" name="brandinitials" value="${esc(c.copy.brand_initials || "")}" maxlength="6">`)}
        ${field("Primary color", input("primarycolor", c.theme.primary_color || "", "#17324d"))}
        ${field("Accent color", input("accentcolor", c.theme.accent_color || "", "#2a6cb0"))}
        ${field("Surface color", input("surfacecolor", c.theme.surface_color || "", "#f4f8fb"))}
        ${field("Hero image URL", input("heroimage", c.copy.hero_image_url || "", "https://app.example.org/consumers/example/hero.jpg"), true)}
        ${field("Effective hero", `<input class="in" value="${esc(c.heroimage)}" readonly>`, true)}
        ${field("Landing headline", input("headline", c.copy.landing_headline || ""), true)}
        ${field("Landing subtitle", textarea("subtitle", c.copy.landing_subtitle || ""), true)}
        ${field("Landing body", textarea("bodycopy", c.copy.landing_body || ""), true)}
        ${field("Initial courses", input("initialcourses", c.copy.initial_courses || "", "Pre-Quraan, Level 1"), true)}
        ${field("Default public path", input("defaultpublicpath", c.defaultpublicpath, "/local/hubredirect/consumer_landing.php"), true)}
        ${field("Default dashboard path", input("defaultdashboardpath", c.defaultdashboardpath, "/local/hubredirect/workspace_dashboard.php"), true)}
      </div>
      <button class="btn" type="submit">Save consumer</button>
    </form>`;

  const linkWorkspaceForm = (c) => `
    <form class="admin" data-do="link_workspace" data-consumerid="${c.id}">
      <div class="grid2">
        <div class="field"><label>Primary workspace</label><select class="in" name="linkworkspaceid">
          <option value="0">Choose workspace</option>
          ${(D.workspaceoptions || []).map((w) => `<option value="${w.id}"${w.id === c.workspaceid ? " selected" : ""}>#${w.id} ${esc(w.name)} (${esc(w.workspace_type)})</option>`).join("")}
        </select></div>
        ${field("Owner user ID", input("owneruserid", c.owneruserid || 0))}
      </div>
      <button class="btn light" type="submit">Link workspace</button>
    </form>`;

  const createWorkspaceForm = (c) => `
    <form class="admin" data-do="create_workspace" data-consumerid="${c.id}">
      <input type="hidden" name="owneruserid" value="${Number(D.currentuserid) || 0}">
      <button class="btn" type="submit">Create workspace for this consumer</button>
    </form>`;

  const domainRow = (c, dm, o) => `
    <div class="domain">
      <div>
        <strong>${esc(dm.domain)}</strong>
        <span class="muted">${esc(dm.domain_type)} / ${esc(dm.status)}${dm.isprimary === 1 ? " / primary" : ""}</span>
        <span class="muted">SSL: ${esc(dm.sslstatus)} / verification: ${esc(dm.verificationstatus)}</span>
      </div>
      <form data-do="update_domain" data-domainid="${dm.id}">
        ${select("domain_type", o.domain_type, dm.domain_type)}
        ${select("domain_status", o.domain_status, dm.status)}
        <label class="check"><input type="checkbox" name="isprimary" value="1"${dm.isprimary === 1 ? " checked" : ""}> Primary ${esc(dm.domain_type)}</label>
        <button class="btn light" type="submit">Update</button>
      </form>
    </div>`;

  const addDomainForm = (c, o) => `
    <form class="admin" data-do="add_domain" data-consumerid="${c.id}" data-workspaceid="${c.workspaceid}">
      <div class="grid2">
        ${field("New domain", input("domain", "", "school.example.org"))}
        ${field("Type", select("domain_type", o.domain_type))}
      </div>
      <label class="check"><input type="checkbox" name="isprimary" value="1"> Make primary</label>
      <button class="btn" type="submit">Add domain</button>
    </form>`;

  const consumerCard = (c, o) => `
    <article class="row">
      <div class="card">
        <h3>${esc(c.name)}</h3>
        <span class="pill">${esc(c.slug)}</span>
        <span class="pill">type: ${esc(c.consumer_type)}</span>
        ${c.consumer_type === "institution" ? `<span class="pill">institution: ${esc(c.institution_type_label)}</span>` : ""}
        ${c.consumer_type === "institution" && c.faith_subcategory ? `<span class="pill">faith: ${esc(c.faith_subcategory_label)}</span>` : ""}
        ${c.consumer_type === "institution" ? `<span class="pill">method: ${esc(c.teaching_method_label)}</span>` : ""}
        ${c.consumer_type === "institution" ? `<span class="pill">operator: ${esc(c.operator_type_label)}</span>` : ""}
        <span class="pill${c.status === "active" ? "" : " warn"}">consumer: ${esc(c.status)}</span>
        <span class="pill${(c.workspacestatus || "missing") === "active" ? "" : " warn"}">workspace: ${esc(c.workspacestatus || "missing")}</span>
        <span class="muted">Workspace #${c.workspaceid} / ${esc(c.workspacename || "missing")}${c.owneruserid && D.names && D.names[c.owneruserid] ? " · owner: " + esc(D.names[c.owneruserid]) : ""}</span>
        <span class="muted">Support: ${esc(c.supportemail)}</span>
        <div class="linkrow">
          ${c.workspaceid > 0
            ? linkBtn(c.links.settings, "Settings") + linkBtn(c.links.workspace, "Workspace") + linkBtn(c.links.profile, "Profile")
            : linkBtn(c.links.onboarding, "Create workspace")}
          ${linkBtn(c.links.landing, "Landing")}
          ${linkBtn(c.links.diagnostics, "Consumer diagnostics")}
          ${linkBtn(c.links.probe, "Probe")}
        </div>
        ${consumerForm(c, o)}
        ${linkWorkspaceForm(c)}
        ${c.workspaceid <= 0 ? createWorkspaceForm(c) : ""}
      </div>
      <div class="card">
        <h2>Domains</h2>
        ${(c.domains || []).length ? c.domains.map((dm) => domainRow(c, dm, o)).join("") : '<div class="empty">No domains linked.</div>'}
        ${c.workspaceid > 0 ? addDomainForm(c, o) : '<div class="empty" style="margin-top:12px">Create or link a primary workspace before adding more domains.</div>'}
      </div>
    </article>`;

  function render(d) {
    const o = d.options || {};
    const t = d.toplinks || {};
    $("#toplinks").innerHTML =
      linkBtn(t.dashboard, "Dashboard") +
      (t.create_consumer ? `<a class="btn" href="${esc(t.create_consumer)}" target="_blank" rel="noopener">Create consumer</a>` : "") +
      linkBtn(t.institution_wizard, "Institution wizard") +
      linkBtn(t.diagnostics, "Diagnostics");
    $("#consumers").innerHTML = (d.consumers || []).length
      ? d.consumers.map((c) => consumerCard(c, o)).join("")
      : '<div class="empty">No consumer apps found yet.</div>';
    $("#status").hidden = true;

    // Faith sub-category visibility sync (same behavior as the legacy inline JS).
    document.querySelectorAll("form[data-do='update_consumer']").forEach((form) => {
      const type = form.querySelector("select[name='institution_type']");
      const fieldEl = form.querySelector(".faith-field");
      const sub = fieldEl ? fieldEl.querySelector("select[name='faith_subcategory']") : null;
      const sync = () => {
        const show = type && type.value === "faith_based_education";
        if (fieldEl) fieldEl.style.display = show ? "" : "none";
        if (!show && sub) sub.value = "";
      };
      if (type && fieldEl) { type.addEventListener("change", sync); sync(); }
    });

    document.querySelectorAll("form[data-do]").forEach((f) => f.addEventListener("submit", submitAction));
  }

  async function submitAction(ev) {
    ev.preventDefault();
    const f = ev.currentTarget;
    const btn = f.querySelector("button[type='submit']");
    const btnText = btn ? btn.textContent : "";
    if (btn) { btn.disabled = true; btn.textContent = "Saving…"; }
    const body = { do: f.dataset.do };
    if (f.dataset.consumerid) body.consumerid = Number(f.dataset.consumerid);
    if (f.dataset.workspaceid) body.workspaceid = Number(f.dataset.workspaceid);
    if (f.dataset.domainid) body.domainid = Number(f.dataset.domainid);
    f.querySelectorAll("input[name],select[name],textarea[name]").forEach((el) => {
      if (el.type === "checkbox") { body[el.name] = el.checked ? 1 : 0; return; }
      body[el.name] = el.value;
    });
    try {
      const r = await fetch(endpoint + "?" + new URLSearchParams({ report: "platform-consumers", token }), {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(body),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok || !d.ok) throw new Error(d.error || ("HTTP " + r.status));
      $("#status").className = "status saved"; $("#status").hidden = false; $("#status").textContent = d.message || "Saved.";
      load();
      window.scrollTo({ top: 0, behavior: "smooth" });
    } catch (e) {
      if (btn) { btn.disabled = false; btn.textContent = btnText; }
      $("#status").className = "status error"; $("#status").hidden = false; $("#status").textContent = "Could not save: " + e.message;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  }

  load();
})();
</script>
</body>
</html>
