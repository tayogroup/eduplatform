<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student finance profiles · EduPlatform portal</title>
<style>
  :root{--ink:#12263a;--ink2:#3f5872;--muted:#6b7f93;--line:#d8e2ec;--bg:#f4f7fa;--card:#ffffff;--blue:#17324d;--blue2:#2a6cb0;--sky:#e8f1fa;--amber:#b97e12;--amber-bg:#fdf3df;--red:#b3392c;--red-bg:#fbe9e6;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 system-ui,-apple-system,"Segoe UI",Arial,sans-serif}
  .top{background:var(--blue);color:#fff;padding:14px 0}
  .wrap{width:min(1120px,calc(100% - 32px));margin:0 auto}
  .top .wrap{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{font-weight:900;font-size:17px}.brand small{display:block;font-weight:700;font-size:12px;color:#b9cbdd}
  .top .note{font-size:12px;color:#b9cbdd}
  main{padding:22px 0 48px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:16px}
  h1{margin:0 0 2px;font-size:22px}
  h2{margin:0 0 10px;font-size:16px}
  h3{margin:0 0 8px;font-size:14px}
  .sub{margin:0;color:var(--muted);font-size:13px}
  .muted{color:var(--muted);font-size:12px}
  .status{padding:12px 14px;border-radius:8px;background:var(--sky);color:var(--blue);font-weight:700;margin-bottom:16px}
  .status.error{background:var(--red-bg);color:var(--red)}
  .status.saved{background:#e1f2ff;color:var(--blue2)}
  .grid{display:grid;grid-template-columns:300px minmax(0,1fr);gap:16px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  form.search{display:flex;gap:8px;margin-bottom:12px}
  input,select,textarea{width:100%;border:1px solid var(--line);border-radius:7px;padding:8px 10px;font:inherit;font-size:13px;background:var(--card);color:var(--ink)}
  textarea{min-height:64px;resize:vertical}
  label{display:block;font-size:12px;font-weight:800;color:var(--ink2);margin:8px 0 3px}
  button{background:var(--blue2);color:#fff;border:0;border-radius:8px;padding:8px 16px;font-weight:900;font-size:13px;cursor:pointer}
  button.light{background:var(--sky);color:var(--blue)}
  button:disabled{opacity:.55;cursor:wait}
  .list{display:grid;gap:8px}
  a.student{display:block;border:1px solid var(--line);border-radius:10px;padding:11px 12px;background:var(--card);color:var(--ink);text-decoration:none}
  a.student:hover{border-color:var(--blue2)}
  a.student.current{border-color:var(--blue2);background:var(--sky)}
  a.student b{display:block;font-size:13px}
  a.student span{display:block;color:var(--muted);font-size:12px}
  .pill{display:inline-block;padding:3px 11px;border-radius:999px;font-size:11px;font-weight:900;margin:0 4px 4px 0}
  .pill.ok{background:#e1f2ff;color:var(--blue2)}
  .pill.warn{background:var(--amber-bg);color:var(--amber)}
  .pill.block{background:var(--red-bg);color:var(--red)}
  .kv{display:grid;grid-template-columns:190px minmax(0,1fr);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-top:10px}
  .kv div{padding:9px 11px;border-bottom:1px solid var(--line);font-size:13px}
  .kv div:nth-child(odd){background:var(--bg);color:var(--ink2);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.3px}
  .kv div:nth-last-child(-n+2){border-bottom:0}
  @media(max-width:820px){.kv{grid-template-columns:1fr}}
  .card{border:1px solid var(--line);border-radius:10px;padding:14px 16px;background:var(--card);margin-top:14px}
  .tablewrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
  th,td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
  th{color:var(--ink2);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .formgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
  .formgrid .wide{grid-column:1/-1}
  @media(max-width:820px){.formgrid{grid-template-columns:1fr}}
  form.inline{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;margin-top:6px}
  form.inline input{width:auto;min-width:180px}
</style>
</head>
<body>
<header class="top"><div class="wrap">
  <div class="brand">EduPlatform Portal<small>Student finance profiles</small></div>
  <div class="note">Token-authenticated · parallel-run of student_finance.php</div>
</div></header>
<main class="wrap">
  <div class="panel"><h1 id="title">Student finance profiles</h1><p class="sub">Phase 1 diagnostic view for billing account and student finance profile linkage.</p></div>
  <div id="status" class="status">Loading finance profiles…</div>
  <div class="grid" id="layout" hidden>
    <aside class="panel">
      <form class="search" id="searchform">
        <input name="q" id="q" placeholder="Name, email, Account No.">
        <button type="submit" class="light">Filter</button>
      </form>
      <div class="list" id="students"></div>
    </aside>
    <section class="panel" id="detail"></section>
  </div>
</main>
<script>
(() => {
  const qs = new URLSearchParams(location.search);
  const endpoint = (qs.get("endpoint") || "").trim();
  const token = (qs.get("token") || "").replace(/[^A-Za-z0-9._-]/g, "");
  const $ = (s) => document.querySelector(s);
  const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  if (!endpoint || !token) { $("#status").className = "status error"; $("#status").textContent = "Missing endpoint/token — open via the Moodle portal launch link."; return; }

  const apiParams = () => {
    const p = new URLSearchParams({ report: "student-finance", token });
    for (const k of ["consumer", "workspaceid", "studentid", "q"]) { const v = qs.get(k); if (v) p.set(k, v); }
    return p;
  };

  const pageUrl = (extra) => {
    const u = new URL(location.href);
    for (const [k, v] of Object.entries(extra)) { if (v === null || v === "") u.searchParams.delete(k); else u.searchParams.set(k, v); }
    return u.href;
  };

  async function load() {
    try {
      const r = await fetch(endpoint + "?" + apiParams());
      if (!r.ok) throw new Error("HTTP " + r.status + " — " + (await r.text()).slice(0, 200));
      const d = await r.json();
      if (!d.ok) throw new Error(d.error || "unknown");
      render(d);
    } catch (e) { $("#status").className = "status error"; $("#status").hidden = false; $("#status").textContent = "Could not load: " + e.message; }
  }

  async function post(payload, btn) {
    if (btn) { btn.disabled = true; }
    try {
      const r = await fetch(endpoint + "?" + new URLSearchParams({ report: "student-finance", token }), {
        method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(payload),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok || !d.ok) throw new Error(d.error || ("HTTP " + r.status));
      $("#status").className = "status saved"; $("#status").hidden = false; $("#status").textContent = d.message || "Saved.";
      window.scrollTo({ top: 0, behavior: "smooth" });
      load();
    } catch (e) {
      if (btn) { btn.disabled = false; }
      $("#status").className = "status error"; $("#status").hidden = false; $("#status").textContent = "Could not save: " + e.message;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  }

  const kvRow = (label, value) => `<div>${esc(label)}</div><div>${value}</div>`;

  const holdRow = (h, sid) => `
    <tr>
      <td>${esc(h.status_label)}</td>
      <td>${esc(h.type_label)}<span class="muted" style="display:block">${esc((h.amount || "") + " " + (h.currency || ""))}</span></td>
      <td>${esc(h.reason)}</td>
      <td>${esc(h.parentmessage)}</td>
      <td>
        ${h.suggested ? `<form class="inline" data-do="activate_finance_hold" data-holdid="${h.id}" data-studentid="${sid}"><button type="submit">Activate</button></form>` : ""}
        ${h.unresolved
          ? `<form class="inline" data-do="resolve_finance_hold" data-holdid="${h.id}" data-studentid="${sid}"><input name="resolutionnote" placeholder="Resolution note" required><button type="submit" class="light">Resolve</button></form>`
          : `<span class="muted">${esc(h.resolutionnote)}</span>`}
      </td>
    </tr>`;

  function detailHtml(d) {
    const s = d.selected;
    if (!s) return "<div class='muted'>Choose a student to view finance profile readiness.</div>";
    const f = d.finance, a = d.account, rc = d.releasecheck || {};
    let h = `<h2>${esc(s.name)}</h2><p class="sub">${esc(s.accountlabel)} / ${esc(s.email)}</p><div style="margin:12px 0">`;
    if (!(d.warnings || []).length) h += `<span class="pill ok">Finance profile ready</span>`;
    h += (d.warnings || []).map((w) => `<span class="pill warn">${esc(String(w).replace(/_/g, " "))}</span>`).join("");
    h += `</div>`;
    if (!d.schemaready) h += `<div class="status error">Student finance schema is not ready. Run the local_prequran Moodle upgrade.</div>`;
    if (!a && d.schemaready) h += `<form data-do="resolve_family_account" data-studentid="${s.id}" style="margin-bottom:14px"><button type="submit">Create family billing profile</button></form>`;
    h += `<div class="kv">`
      + kvRow("Student ID", esc(s.id))
      + kvRow("Finance profile", f ? esc("#" + f.id + " / " + f.status) : "Not created")
      + kvRow("Hold status", f ? esc(f.holdstatus) : "none")
      + kvRow("Billing account", a ? esc("#" + a.id) : "Not linked")
      + kvRow("Account type", a ? esc(a.type_label) : "")
      + kvRow("Account status", a ? esc(a.status_label) : "")
      + kvRow("Display name", a ? esc(a.displayname) : "")
      + kvRow("Billing email", a ? esc(a.billingemail) : "")
      + kvRow("Currency", a ? esc(a.currency) : "")
      + kvRow("Primary payer user", a ? esc(a.primaryuserid) : "")
      + kvRow("Consumer", esc(a ? a.consumerid : d.consumerid))
      + kvRow("Workspace", esc(a ? a.workspaceid : (d.workspace && d.workspace.id) || ""))
      + `</div>`;
    h += `<div class="card"><h3>Academic release controls</h3><div style="margin-bottom:8px">`
      + `<span class="pill ${rc.blocked ? "block" : "ok"}">Transcript policy: ${esc(String(rc.behavior || "").replace(/_/g, " "))}</span>`
      + (rc.warnings || []).map((w) => `<span class="pill warn">${esc(w)}</span>`).join("")
      + `</div><form data-do="refresh_finance_hold_candidates" data-studentid="${s.id}"><button type="submit" class="light">Refresh automatic hold candidates</button></form></div>`;
    h += `<div class="card"><h3>Create manual finance hold</h3>
      <form data-do="create_finance_hold" data-studentid="${s.id}" class="formgrid">
        <div><label>Hold type</label><select name="holdtype"><option value="manual">Manual finance hold</option><option value="manual_review">Manual review</option></select></div>
        <div><label>Parent-safe message</label><input name="parentmessage" placeholder="Optional public billing message"></div>
        <div class="wide"><label>Internal reason</label><textarea name="reason" required></textarea></div>
        <div class="wide" style="margin-top:10px"><button type="submit">Create hold</button></div>
      </form></div>`;
    h += `<div class="card"><h3>Finance holds</h3>`;
    if (!d.holdschemaready) h += `<div class="muted">Finance hold schema is not ready. Run the local_prequran Moodle upgrade.</div>`;
    else if (!(d.holds || []).length) h += `<div class="muted">No finance holds recorded for this student.</div>`;
    else h += `<div class="tablewrap"><table><thead><tr><th>Status</th><th>Type</th><th>Reason</th><th>Public message</th><th>Action</th></tr></thead><tbody>${d.holds.map((x) => holdRow(x, s.id)).join("")}</tbody></table></div>`;
    h += `</div>`;
    return h;
  }

  function render(d) {
    $("#q").value = d.q || "";
    const selId = d.selected ? d.selected.id : 0;
    $("#students").innerHTML = (d.students || []).map((st) => `
      <a class="student${st.id === selId ? " current" : ""}" href="${esc(pageUrl({ studentid: st.id }))}">
        <b>${esc(st.name)}</b><span>${esc(st.accountlabel)} / ${esc(st.email)}</span>
      </a>`).join("") || "<div class='muted'>No students found.</div>";
    $("#detail").innerHTML = detailHtml(d);
    $("#layout").hidden = false;
    $("#status").hidden = true;
    document.querySelectorAll("#detail form[data-do]").forEach((f) => f.addEventListener("submit", (ev) => {
      ev.preventDefault();
      const payload = { do: f.dataset.do, studentid: Number(f.dataset.studentid) };
      if (f.dataset.holdid) payload.holdid = Number(f.dataset.holdid);
      for (const name of ["holdtype", "parentmessage", "reason", "resolutionnote"]) {
        if (f[name]) payload[name] = f[name].value;
      }
      post(payload, f.querySelector("button"));
    }));
  }

  $("#searchform").addEventListener("submit", (ev) => {
    ev.preventDefault();
    location.href = pageUrl({ q: $("#q").value.trim(), studentid: "" });
  });

  load();
})();
</script>
</body>
</html>
