<!doctype html>
<html lang="so">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>__EPISODE_TITLE__</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #050816;
      color: #f8fafc;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #050816;
      overflow: hidden;
    }
    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      min-height: 100vh;
    }
    .stage {
      position: relative;
      display: grid;
      place-items: center;
      background: #000;
    }
    video {
      width: 100%;
      height: 100vh;
      object-fit: contain;
      background: #000;
    }
    .play-panel {
      position: absolute;
      left: 50%;
      top: 50%;
      display: grid;
      gap: 14px;
      justify-items: center;
      transform: translate(-50%, -50%);
      padding: 24px 28px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 8px;
      background: rgba(16,24,39,.88);
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
    }
    .play-panel.is-hidden {
      display: none;
    }
    .play-button {
      min-width: 210px;
      min-height: 58px;
      border: 0;
      border-radius: 8px;
      background: #0f766e;
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
    }
    .play-status {
      max-width: 360px;
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.35;
      text-align: center;
    }
    aside {
      padding: 34px 30px;
      background: #101827;
      border-left: 1px solid rgba(255,255,255,.12);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.12;
      letter-spacing: 0;
    }
    .meta {
      color: #a7b4c7;
      font-size: 17px;
      margin-bottom: 28px;
    }
    ol {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 18px;
    }
    li {
      font-size: 18px;
      line-height: 1.35;
      color: #e5edf7;
    }
    li span {
      display: block;
      color: #5eead4;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      aside { display: none; }
    }
  </style>
</head>
<body>
  <main>
    <section class="stage">
      <video id="episode-video" src="__VIDEO_SRC__" controls preload="auto" playsinline></video>
      <div class="play-panel" id="play-panel">
        <button class="play-button" id="play-button" type="button">Play episode</button>
        <div class="play-status" id="play-status">Press play to start the video.</div>
      </div>
    </section>
    <aside>
      <h1>__EPISODE_TITLE__</h1>
      <div class="meta">__GENERATED_AT__</div>
      <ol>
        __HEADLINES__
      </ol>
    </aside>
  </main>
  <script>
    const video = document.getElementById('episode-video');
    const panel = document.getElementById('play-panel');
    const playButton = document.getElementById('play-button');
    const status = document.getElementById('play-status');

    async function startPlayback() {
      try {
        status.textContent = 'Starting...';
        video.muted = false;
        await video.play();
        panel.classList.add('is-hidden');
      } catch (error) {
        status.textContent = 'Browser blocked autoplay. Press Play episode again, or use the video controls.';
        panel.classList.remove('is-hidden');
      }
    }

    playButton.addEventListener('click', startPlayback);
    video.addEventListener('play', () => panel.classList.add('is-hidden'));
    video.addEventListener('pause', () => {
      if (!video.ended) {
        status.textContent = 'Paused. Press play to continue.';
        panel.classList.remove('is-hidden');
      }
    });
    video.addEventListener('ended', () => {
      status.textContent = 'Episode finished. Press play to watch again.';
      panel.classList.remove('is-hidden');
    });

    window.addEventListener('load', () => {
      video.play().then(() => {
        panel.classList.add('is-hidden');
      }).catch(() => {
        status.textContent = 'Press play to start the video.';
      });
    });
  </script>
</body>
</html>
